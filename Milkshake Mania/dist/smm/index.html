    <style>
      /*
       * Acrylic blur is declared here (inline, not in the bundled CSS) because
       * the production CSS minifier (Tailwind v4 / Lightning CSS) drops the
       * unprefixed `backdrop-filter` and keeps only `-webkit-`, which Firefox /
       * Gecko ignores — so the build looked transparent while dev did not.
       * Both prefixes + !important guarantee the frosted glass survives the build.
       */
      .glass-panel {
        -webkit-backdrop-filter: blur(18px) saturate(160%) !important;
        backdrop-filter: blur(18px) saturate(160%) !important;
      }

      /*
       * Pre-hydration boot spinner. Lives inside #root so React's
       * createRoot(...).render() wipes it automatically on first paint -
       * no JS teardown needed. Covers the ~1-2s bundle parse/init gap that
       * otherwise showed a blank page. Styled to match the in-app
       * "Loading save..." spinner (App.tsx) so the two never look different.
       */
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0a0a0a; /* neutral-950 */
        font-family: "Inter", system-ui, sans-serif;
        z-index: 9999;
      }
      #boot-loader .boot-ring {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #22d3ee; /* cyan-400 */
        animation: boot-spin 0.7s linear infinite;
      }
      #boot-loader .boot-title {
        color: rgba(255, 255, 255, 0.5);
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        animation: boot-pulse 2s ease-in-out infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-loader .boot-ring {
          animation-duration: 2.4s;
        }
        #boot-loader .boot-title {
          animation: none;
        }
      }
    </style>
